<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>n8nExperts Login Screen</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#f42559",
                        "background-light": "#f8f5f6",
                        "background-dark": "#0a0a0a",
                        "card-dark": "rgba(25, 25, 25, 0.7)",
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        .grid-pattern {
            background-image: radial-gradient(circle at 1px 1px, rgba(255, 255, 255, 0.05) 1px, transparent 0);
            background-size: 40px 40px;
        }
        .glow-effect {
            background: radial-gradient(circle at top right, rgba(244, 37, 89, 0.15), transparent 40%);
        }
        .glass-card {
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
        }
        .input-glow:focus-within {
            border-color: #f42559;
            box-shadow: 0 0 0 2px rgba(244, 37, 89, 0.2);
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-gray-900 dark:text-gray-100 min-h-screen flex flex-col">
<!-- Decorative Background Elements -->
<div class="fixed inset-0 grid-pattern pointer-events-none"></div>
<div class="fixed inset-0 glow-effect pointer-events-none"></div>
<!-- Main Navigation (Minimalist) -->
<header class="relative z-10 w-full px-6 py-6 lg:px-20">
<div class="max-w-7xl mx-auto flex justify-between items-center">
<div class="flex items-center gap-3">
<div class="bg-primary p-1.5 rounded-lg flex items-center justify-center">
<span class="material-symbols-outlined text-white text-xl">hub</span>
</div>
<h2 class="text-xl font-bold tracking-tight">n8nExperts</h2>
</div>
<a class="text-sm font-semibold hover:text-primary transition-colors" href="#">Help Center</a>
</div>
</header>
<!-- Login Container -->
<main class="flex-grow flex items-center justify-center px-4 py-12 relative z-10">
<div class="w-full max-w-[460px]">
<!-- Glassmorphic Card -->
<div class="glass-card bg-card-dark rounded-xl p-8 lg:p-10">
<div class="text-center mb-10">
<h1 class="text-3xl font-bold text-white mb-2">Welcome back</h1>
<p class="text-gray-400 text-sm">Sign in to your n8nExperts account</p>
</div>
<!-- Social Login -->
<div class="space-y-4 mb-8">
<button class="w-full flex items-center justify-center gap-3 bg-[#1a1a1a] hover:bg-[#252525] border border-[#333] text-white py-3 px-4 rounded-lg transition-all duration-200">
<svg class="w-5 h-5" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
<span class="text-sm font-semibold tracking-wide">Continue with Google</span>
</button>
</div>
<!-- Separator -->
<div class="relative mb-8">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-white/10"></div>
</div>
<div class="relative flex justify-center text-xs uppercase">
<span class="bg-background-dark px-3 text-gray-500 font-medium">or continue with email</span>
</div>
</div>
<!-- Form Fields -->
<form class="space-y-5">
<div class="space-y-2">
<label class="text-xs font-semibold text-gray-400 uppercase tracking-wider pl-1" for="email">Email Address</label>
<div class="relative input-glow rounded-lg border border-white/10 transition-all duration-200">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-gray-500 text-xl">mail</span>
<input class="w-full bg-transparent border-none py-3 pl-11 pr-4 text-white placeholder:text-gray-600 focus:ring-0 text-sm" id="email" placeholder="alex@company.com" type="email"/>
</div>
</div>
<div class="space-y-2">
<label class="text-xs font-semibold text-gray-400 uppercase tracking-wider pl-1" for="password">Password</label>
<div class="relative input-glow rounded-lg border border-white/10 transition-all duration-200">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-gray-500 text-xl">lock</span>
<input class="w-full bg-transparent border-none py-3 pl-11 pr-4 text-white placeholder:text-gray-600 focus:ring-0 text-sm" id="password" placeholder="••••••••" type="password"/>
</div>
</div>
<div class="flex items-center justify-between text-xs py-1">
<label class="flex items-center gap-2 cursor-pointer group">
<input class="w-4 h-4 rounded border-white/10 bg-white/5 text-primary focus:ring-primary focus:ring-offset-background-dark" type="checkbox"/>
<span class="text-gray-400 group-hover:text-gray-200 transition-colors">Remember me</span>
</label>
<a class="text-primary hover:underline font-semibold" href="#">Forgot password?</a>
</div>
<!-- Action Button -->
<button class="w-full flex items-center justify-between bg-primary hover:brightness-110 active:scale-[0.98] text-white font-bold py-3.5 px-6 rounded-lg transition-all duration-200 shadow-lg shadow-primary/20" type="submit">
<span class="flex-1 text-center ml-4">Sign in</span>
<span class="material-symbols-outlined">arrow_forward</span>
</button>
</form>
<!-- Footer -->
<div class="mt-10 text-center">
<p class="text-gray-400 text-sm">
                        Don't have an account? 
                        <a class="text-primary font-bold hover:underline ml-1" href="#">Sign up</a>
</p>
</div>
</div>
<!-- Optional Trust Elements -->
<div class="mt-12 flex items-center justify-center gap-8 opacity-40 grayscale hover:grayscale-0 hover:opacity-100 transition-all duration-500">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-sm">verified_user</span>
<span class="text-xs font-medium uppercase tracking-widest">Enterprise Ready</span>
</div>
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-sm">encrypted</span>
<span class="text-xs font-medium uppercase tracking-widest">Secure Payments</span>
</div>
</div>
</div>
</main>
<!-- Visual Accent (Lower Glow) -->
<div class="fixed bottom-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-primary/30 to-transparent"></div>
</body></html>
